let recognition=null,isRecording=false;
function setStatus(msg,isErr){
  const el=document.getElementById('voiceStatus');
  el.textContent=msg;
  el.className='voice-status'+(isErr?' err':'');
}
function toggleVoice(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){setStatus('⚠️ 請改用 Chrome 瀏覽器',true);return;}
  if(isRecording){try{recognition.stop();}catch(e){}return;}
  recognition=new SR();
  recognition.lang='zh-TW';
  recognition.interimResults=true;
  recognition.continuous=false;
  recognition.maxAlternatives=1;
  recognition.onstart=()=>{
    isRecording=true;
    document.getElementById('voiceBtn').classList.add('recording');
    document.getElementById('voiceBtn').textContent='🔴 錄音中…';
    setStatus('正在聆聽，請說出需求…');
  };
  recognition.onresult=(e)=>{
    let final='',interim='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      const t=e.results[i][0].transcript;
      if(e.results[i].isFinal)final+=t;else interim+=t;
    }
    const text=(final||interim).trim();
    if(text)document.getElementById('queryInput').value=text;
    if(final)setStatus('✅ 辨識完成：'+final);
  };
  recognition.onend=()=>{
    isRecording=false;
    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voiceBtn').textContent='🎤 語音輸入';
    const val=document.getElementById('queryInput').value.trim();
    if(val){setStatus('');setTimeout(doSearch,300);}
    else setStatus('未偵測到語音，請再試一次');
  };
  recognition.onerror=(e)=>{
    isRecording=false;
    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voiceBtn').textContent='🎤 語音輸入';
    const msgs={'not-allowed':'請允許麥克風權限後重試','no-speech':'未偵測到語音，請靠近麥克風','network':'網路問題，語音辨識失敗'};
    setStatus('⚠️'+(msgs[e.error]||'語音辨識失敗，請手動輸入'),true);
  };
  try{recognition.start();}catch(e){setStatus('⚠️ 語音啟動失敗',true);}
}


function scoreTools(query){
  const q=query.toLowerCase().replace(/[，。！？、\s]+/g,' ').trim();
  const words=q.split(/\s+/).filter(Boolean);
  const fullQ=q.replace(/[\s\/／\-]/g,'');

  // 先檢查是否完全匹配搜尋分類（快速標籤直接命中）
  for(const [cat,map] of Object.entries(SEARCH_MAP)){
    const catKey=cat.toLowerCase().replace(/[\s\/／\-]/g,'');
    if(fullQ===catKey||fullQ.includes(catKey)||catKey.includes(fullQ)||
       words.some(w=>w.length>=2&&cat.toLowerCase().includes(w))){
      return {
        matchedCategory:cat,
        primary:map.primary.map(id=>TOOLS.find(t=>t.id===id)).filter(Boolean),
        secondary:map.secondary.map(id=>TOOLS.find(t=>t.id===id)).filter(Boolean),
      };
    }
  }

  // 關鍵字模糊比對
  const scored=TOOLS.map(tool=>{
    let score=0;
    const allKeys=tool.keys.map(k=>k.toLowerCase());
    const nameLC=tool.name.toLowerCase();
    const descLC=tool.desc.toLowerCase();
    allKeys.forEach(key=>{
      if(fullQ.includes(key)||q.includes(key))score+=3;
      words.forEach(w=>{if(w.length>=2&&(w.includes(key)||key.includes(w)))score+=2;});
    });
    words.forEach(w=>{
      if(w.length>=2&&nameLC.includes(w))score+=4;
      if(w.length>=2&&descLC.includes(w))score+=1;
    });
    if(nameLC.includes(fullQ)&&fullQ.length>=2)score+=5;
    return{tool,score};
  }).filter(x=>x.score>0).sort((a,b)=>b.score-a.score);

  if(!scored.length)return null;
  return{
    matchedCategory:null,
    primary:scored.slice(0,4).map(x=>x.tool),
    secondary:scored.slice(4,7).map(x=>x.tool),
  };
}

function doSearch(){
  const query=document.getElementById('queryInput').value.trim();
  if(!query)return;
  track('search', query); // 追蹤搜尋關鍵字
  const result=scoreTools(query);
  const box=document.getElementById('resultsBox');

  if(!result||!result.primary.length){
    box.innerHTML=`<div class="empty-state">
      <div class="empty-icon">🔍</div>
      <div>找不到「${esc(query)}」相關教具</div>
      <div style="font-size:.8rem;margin-top:6px">請嘗試其他關鍵字，或聯繫教室管理員</div>
      <div style="font-size:.8rem">📞 分機 6301</div>
      <button class="btn-reset" onclick="resetSearch()">🔄 重新搜尋</button>
    </div>`;
    box.style.display='block';
    box.scrollIntoView({behavior:'smooth',block:'start'});
    return;
  }

  const {matchedCategory,primary,secondary}=result;
  const total=primary.length+secondary.length;
  const roomNames=[...new Set(primary.map(t=>ROOMS[t.room].name))].join('、');
  const catLabel=matchedCategory?`「${matchedCategory}」`:`「${query}」`;

  let summary=matchedCategory
    ?`已找到 <strong>${catLabel}</strong> 相關教具共 <strong>${total}</strong> 項，主要位於 <strong>${roomNames}</strong>。`
    :`根據需求 ${catLabel}，找到 <strong>${total}</strong> 項相關教具，主要位於 <strong>${roomNames}</strong>。`;

  let html=`<div class="summary-box"><div class="summary-header">🔍 搜尋結果</div>${summary}歡迎點擊「填寫外借申請表」辦理借用，點擊後教具將自動勾選。</div>`;
  html+=`<div class="section-title">✅ 最推薦教具（${primary.length} 組）</div><div class="card-grid">`;
  primary.forEach(t=>{html+=toolCard(t,false);});
  html+=`</div>`;
  if(secondary.length){
    html+=`<div class="section-title">🔄 其他相關教具（${secondary.length} 組）</div><div class="card-grid">`;
    secondary.forEach(t=>{html+=toolCard(t,true);});
    html+=`</div>`;
  }
  html+=`<div style="text-align:center"><button class="btn-reset" onclick="resetSearch()">🔄 重新搜尋</button></div>`;

  box.innerHTML=html;
  box.style.display='block';
  box.scrollIntoView({behavior:'smooth',block:'start'});
}

function toolCard(t,secondary){
  const room=ROOMS[t.room];
  const cls=secondary?'tool-card secondary':`tool-card ${t.room}`;
  const noteHtml=t.note?`<div class="tool-note">📌 ${esc(t.note)}</div>`:'';
  // 使用教具專屬預填連結，讓借用表單自動勾選該教具
  const borrowUrl=PREFILL_URLS[t.id]||FORM_URL;
  return `<div class="${cls}">
    <span class="room-badge ${t.room}">🏠 ${room.name}｜${room.desc}</span>
    <div class="tool-name">${t.emoji} ${esc(t.name)}</div>
    <div class="tool-desc">${esc(t.desc)}</div>
    ${noteHtml}
    <div class="tool-tags">${t.tags.map(tag=>`<span class="tool-tag">${esc(tag)}</span>`).join('')}</div>
    <a class="btn-borrow" href="${borrowUrl}" target="_blank">📋 填寫外借申請表</a>
  </div>`;
}

function resetSearch(){
  document.getElementById('queryInput').value='';
  document.getElementById('resultsBox').style.display='none';
  setStatus('點擊後開始說話（需Chrome瀏覽器）');
  document.getElementById('queryInput').focus();
  window.scrollTo({top:0,behavior:'smooth'});
}
function useTag(t){
  document.getElementById('queryInput').value=t;
  track('tag_click', t); // 追蹤標籤點擊
  doSearch();
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

</script>
</body>
</html>
